spring:
  datasource:
    url: jdbc:mysql://mysql-master:3306/invitation_enterprise?useUnicode=true&characterEncoding=utf8&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  redis:
    host: redis-sentinel
    port: 26379
    password: ${REDIS_PASSWORD}
    sentinel:
      master: mymaster
      nodes: redis-sentinel:26379,redis-sentinel:26380,redis-sentinel:26381
    lettuce:
      pool:
        max-active: 30
        max-idle: 15
        min-idle: 10
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${MQ_USERNAME}
    password: ${MQ_PASSWORD}

oss:
  type: aliyun
  aliyun:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY}
    access-key-secret: ${OSS_SECRET_KEY}
    bucket-name: ${OSS_BUCKET}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: WARN
    com.invitation: INFO
