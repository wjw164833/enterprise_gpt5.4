spring:
  datasource:
    url: jdbc:mysql://localhost:3306/invitation_enterprise?useUnicode=true&characterEncoding=utf8&useSSL=false
    username: root
    password: 12345
    driver-class-name: com.mysql.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

# JWT配置
zipkin:
  enabled: false
sleuth:
  enabled: false

jwt:
  secret: invitation-enterprise-jwt-secret-key-2026-must-be-at-least-256-bits-long
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000
  header: Authorization
  prefix: "Bearer "

# OSS配置（开发环境用本地存储）
oss:
  type: local
  local:
    base-path: /tmp/invitation-upload
    url-prefix: http://localhost:8080/upload/
  aliyun:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key
    access-key-secret: your-secret-key
    bucket-name: invitation-dev
  tencent:
    region: ap-guangzhou
    secret-id: your-secret-id
    secret-key: your-secret-key
    bucket-name: invitation-dev-1250000000

# 微信配置
wx:
  miniapp:
    appid: your-miniapp-appid
    secret: your-miniapp-secret
  mp:
    appid: your-mp-appid
    secret: your-mp-secret
    token: your-mp-token
    aes-key: your-mp-aes-key

# 短信配置
sms:
  provider: aliyun
  aliyun:
    access-key-id: your-access-key
    access-key-secret: your-secret-key
    sign-name: 邀请函
    template-code: SMS_123456

# AES加密密钥
aes:
  key: invitation-aes-key16

logging:
  level:
    com.invitation: DEBUG
